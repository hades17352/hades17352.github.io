<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級管理系統 V26.4.0 Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', 'Noto Sans TC', sans-serif; background: #f8fafc; min-height: 100vh; overflow: hidden; }
        .bubble-card { backdrop-filter: blur(8px); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.5); transition: 0.3s; }
        .student-card { transition: 0.2s; cursor: pointer; border-radius: 1.5rem; background: white; border: 1px solid #eef2f6; position: relative; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .student-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal.active { display: flex; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #334155; color: white; padding: 10px 24px; border-radius: 99px; z-index: 1000; display: none; font-size: 14px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; color: #6366f1; }
        .admin-only { display: none !important; }
        body.admin-mode .admin-only { display: flex !important; }
        body.admin-mode .admin-only-inline { display: inline-block !important; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">同步資料中...</div>
    </div>
    <div id="toast"></div>

    <header class="bg-white/90 border-b border-slate-200 px-8 py-3 flex justify-between items-center z-[60]">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black text-slate-800 tracking-tight italic">CLASS <span class="text-indigo-600">PRO</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="syncFromCloud()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl font-bold text-xs hover:bg-slate-200 transition">🔄 雲端抓取</button>
            <button onclick="saveToCloud()" class="admin-only-inline hidden bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-lg active:scale-95 transition">💾 儲存同步</button>
            <button onclick="askAdminPassword()" id="adminToggleBtn" class="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-xs">🔒 老師模式</button>
        </div>
    </header>

    <main class="flex-1 overflow-hidden relative">
        <section id="viewHub" class="absolute inset-0 overflow-y-auto p-10">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-end mb-10">
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight">班級大廳</h2>
                    <button onclick="addClass()" class="admin-only hidden bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold text-sm">＋ 建立班級</button>
                </div>
                <div id="classList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
            </div>
        </section>

        <section id="viewClassroom" class="absolute inset-0 overflow-y-auto p-6 hidden">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="showHub()" class="text-slate-400 font-bold text-sm flex items-center gap-1 hover:text-slate-600">← 返回大廳</button>
                    <h2 id="currentClassName" class="text-2xl font-black text-slate-800"></h2>
                    <div class="flex gap-2">
                        <button onclick="showStats()" class="bg-indigo-500 text-white px-4 py-2 rounded-xl font-bold text-xs flex items-center gap-1 shadow-md hover:bg-indigo-600">📊 結算統計</button>
                        <button onclick="addStudent()" class="admin-only hidden bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold text-xs">＋ 學生</button>
                        <button onclick="openBehaviorSettings()" class="admin-only hidden bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-xs">評分項目</button>
                    </div>
                </div>
                <div id="studentList" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-6 gap-6 pb-20"></div>
            </div>
        </section>
    </main>

    <div id="statsModal" class="modal">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-2xl max-h-[80vh] overflow-y-auto shadow-2xl">
            <h3 class="text-2xl font-black mb-6 text-slate-800 flex justify-between">
                <span>📊 班級加減分總表</span>
                <button onclick="exportToExcel()" class="text-xs bg-emerald-500 text-white px-3 py-1 rounded-lg">匯出 Excel 格式</button>
            </h3>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b-2 border-slate-100">
                        <th class="py-3 font-bold text-slate-400">座號姓名</th>
                        <th class="py-3 font-bold text-slate-400">總分</th>
                        <th class="py-3 font-bold text-slate-400">最近紀錄</th>
                    </tr>
                </thead>
                <tbody id="statsTableBody"></tbody>
            </table>
            <button onclick="closeModal('statsModal')" class="w-full mt-6 py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl">關閉視窗</button>
        </div>
    </div>

    <div id="scoreModal" class="modal"><div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl text-center"><h3 id="modalStudentName" class="text-2xl font-black mb-6 text-slate-800"></h3><div id="behaviorList" class="grid grid-cols-2 gap-3"></div><button onclick="closeModal('scoreModal')" class="w-full mt-6 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl">取消</button></div></div>
    <div id="behaviorModal" class="modal"><div class="bg-white p-8 rounded-[2rem] w-full max-w-sm shadow-2xl"><h3 class="font-black mb-6 text-xl text-slate-800">評分項目設定</h3><div id="bhManagerList" class="space-y-2 mb-6 max-h-56 overflow-y-auto pr-2"></div><div class="bg-slate-50 p-4 rounded-2xl"><div class="flex gap-2 mb-3"><input type="text" id="newBHName" placeholder="項目" class="flex-1 p-3 rounded-xl text-sm border-none shadow-sm outline-none"><input type="number" id="newBHPoint" value="1" class="w-16 p-3 rounded-xl text-sm text-center font-bold outline-none"></div><button onclick="addNewBH()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">新增項目</button></div><button onclick="closeModal('behaviorModal')" class="w-full mt-4 text-slate-400 font-bold text-xs uppercase">關閉</button></div></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwPGEfW3In-8UoMpf3CzygVw3nUOiFIBVO7jNiuqvCSFBcs-mR5G_rLsucE8_1X0xo/exec"; 
        const ANIMALS = ['🦁','🐯','🦒','🦊','🐨','🐼','🐻','🐰','🐹','🐭','🐸','🐧','🐦','🐤','🦉','🦄','🐴','🐮','🐷','🐙','🦆','🐊','🐍','🐳','🐬','🐶','🐠','🦀','🦋','🐝','🐞','🐿️','🦍','🐘','🦏','🐪','🦓','🦘','🐱','🐶','🦖','🦕','🐲','🌵'];
        
        let db = {};
        let behaviors = [{name:'準時上課', point:1}, {name:'干擾秩序', point:-1}];
        let currentClass = null;
        let isAdmin = false;

        // 初始化
        window.onload = async () => {
            const localDB = localStorage.getItem('classroomDB');
            const localBH = localStorage.getItem('classroomBehaviors');
            if (localDB) db = JSON.parse(localDB);
            if (localBH) behaviors = JSON.parse(localBH);
            
            renderHub();
            // 重點：自動同步，確保換裝置後能自動下載資料
            syncFromCloud(true); 
        };

        // --- 同步機制 ---
        async function syncFromCloud(isSilent = false) {
            if(!isSilent) document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                const res = await fetch(`${API_URL}?t=${Date.now()}`, { redirect: 'follow' });
                const data = await res.json();
                if (data.db) {
                    db = data.db;
                    behaviors = data.behaviors || behaviors;
                    saveLocal();
                    renderHub();
                    if (currentClass) renderClassroom();
                    if(!isSilent) showToast("✅ 雲端資料同步完成");
                }
            } catch (e) {
                if(!isSilent) showToast("⚠️ 同步失敗，請檢查網路");
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        async function saveToCloud() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ db, behaviors }),
                    redirect: 'follow'
                });
                showToast("🚀 已儲存至雲端");
            } catch (e) {
                showToast("❌ 儲存失敗");
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        // --- 渲染 ---
        function renderHub() {
            document.getElementById('viewHub').classList.remove('hidden');
            document.getElementById('viewClassroom').classList.add('hidden');
            const list = document.getElementById('classList');
            list.innerHTML = Object.keys(db).map(cls => `
                <div onclick="enterClass('${cls}')" class="bubble-card bg-white p-8 shadow-sm flex justify-between items-center cursor-pointer hover:bg-slate-50 transition">
                    <span class="text-2xl font-black text-slate-700">🏫 ${cls} 班</span>
                    <button onclick="event.stopPropagation(); deleteClass('${cls}')" class="admin-only hidden text-red-300 hover:text-red-500">✕</button>
                </div>
            `).join('');
        }

        function renderClassroom() {
            const list = document.getElementById('studentList');
            list.innerHTML = db[currentClass].map((s, i) => {
                const total = (s.logs || []).reduce((sum, l) => sum + l.point, 0);
                return `
                    <div class="student-card p-6 text-center" onclick="showScoreModal(${i})">
                        <div class="absolute top-2 left-3 text-[10px] font-bold text-slate-300">${i+1}</div>
                        <div class="text-5xl mb-3">${s.icon || '👤'}</div>
                        <div class="font-black text-slate-800 text-lg mb-1">${s.name}</div>
                        <div class="text-3xl font-black ${total >= 0 ? 'text-indigo-500' : 'text-rose-500'}">${total}</div>
                        <div class="admin-only hidden justify-center gap-2 mt-3">
                            <button onclick="event.stopPropagation(); editStudent(${i})" class="text-[10px] bg-slate-100 px-2 py-1 rounded-md text-slate-500">編輯</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 結算功能 (對應圖片三) ---
        function showStats() {
            const body = document.getElementById('statsTableBody');
            body.innerHTML = db[currentClass].map((s, i) => {
                const total = (s.logs || []).reduce((sum, l) => sum + l.point, 0);
                const lastLog = s.logs && s.logs.length ? s.logs[s.logs.length-1] : {name:'無', point:0};
                return `
                    <tr class="border-b border-slate-50">
                        <td class="py-4 font-bold text-slate-700">${i+1}. ${s.name}</td>
                        <td class="py-4 font-black ${total >= 0 ? 'text-blue-500' : 'text-red-500'}">${total}</td>
                        <td class="py-4 text-xs text-slate-400">${lastLog.name} (${lastLog.point >= 0 ? '+' : ''}${lastLog.point})</td>
                    </tr>
                `;
            }).join('');
            openModal('statsModal');
        }

        // --- 其餘邏輯 ---
        function enterClass(name) {
            currentClass = name;
            document.getElementById('currentClassName').innerText = name + " 教室";
            document.getElementById('viewHub').classList.add('hidden');
            document.getElementById('viewClassroom').classList.remove('hidden');
            renderClassroom();
        }

        function showHub() { currentClass = null; renderHub(); }

        function showScoreModal(idx) {
            const s = db[currentClass][idx];
            document.getElementById('modalStudentName').innerText = s.name;
            document.getElementById('behaviorList').innerHTML = behaviors.map(b => `
                <button onclick="addPoint(${idx}, '${b.name}', ${b.point})" 
                    class="p-4 rounded-2xl font-bold text-white transition active:scale-90 ${b.point >= 0 ? 'bg-indigo-400' : 'bg-rose-400'}">
                    ${b.name} (${b.point > 0 ? '+' : ''}${b.point})
                </button>
            `).join('');
            openModal('scoreModal');
        }

        function addPoint(sIdx, bName, pt) {
            if(!db[currentClass][sIdx].logs) db[currentClass][sIdx].logs = [];
            db[currentClass][sIdx].logs.push({ name: bName, point: pt, time: new Date().toLocaleString() });
            saveLocal(); renderClassroom(); closeModal('scoreModal');
            showToast(`${db[currentClass][sIdx].name} ${bName} ${pt > 0 ? '+' : ''}${pt}`);
        }

        function askAdminPassword() {
            if(isAdmin) { isAdmin = false; document.body.classList.remove('admin-mode'); document.getElementById('adminToggleBtn').innerText = "🔒 老師模式"; return; }
            const pw = prompt("管理密碼:");
            if(pw === "1234") { isAdmin = true; document.body.classList.add('admin-mode'); document.getElementById('adminToggleBtn').innerText = "🔓 管理中"; }
        }

        function addStudent() {
            const name = prompt("學生姓名:");
            if(name) {
                const icon = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
                db[currentClass].push({name, logs: [], icon});
                saveLocal(); renderClassroom();
            }
        }

        function addClass() {
            const name = prompt("新班級名稱:");
            if(name && !db[name]) { db[name] = []; saveLocal(); renderHub(); }
        }

        function saveLocal() {
            localStorage.setItem('classroomDB', JSON.stringify(db));
            localStorage.setItem('classroomBehaviors', JSON.stringify(behaviors));
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
