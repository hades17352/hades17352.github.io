<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級管理系統 V24.6.0 Firebase Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 保留原本所有 CSS 樣式 */
        body { font-family: 'Nunito', 'Noto Sans TC', sans-serif; background: #f8fafc; min-height: 100vh; overflow: hidden; }
        .bubble-card { backdrop-filter: blur(8px); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.5); transition: 0.3s; position: relative; }
        .bubble-pink { background: #fee2e2; } .bubble-blue { background: #e0f2fe; }
        .bubble-green { background: #dcfce7; } .bubble-purple { background: #f3e8ff; }
        .bubble-orange { background: #ffedd5; }
        .student-card { transition: 0.2s; cursor: pointer; border-radius: 1.25rem; background: white; border: 1px solid #e2e8f0; position: relative; }
        .student-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #cbd5e1; }
        .admin-controls { position: absolute; top: 0.4rem; right: 0.4rem; display: none; flex-direction: column; gap: 4px; z-index: 50; }
        body.admin-mode .admin-controls { display: flex; }
        .hidden-view { display: none !important; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #334155; color: white; padding: 10px 20px; border-radius: 12px; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; font-size: 14px; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #6366f1; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="loadingOverlay">☁️ 雲端資料同步中...</div>
    <div id="toast">操作成功</div>

    <header class="bg-white border-b px-8 py-4 flex justify-between items-center z-[60]">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black text-slate-800">CLASS MANAGER <span class="text-[10px] text-indigo-500 font-bold ml-1">CLOUD V24</span></h1>
            <div id="navBreadcrumb" class="hidden text-slate-400 font-bold flex items-center gap-2 text-sm">
                <span>/</span><span id="breadcrumbClass" class="text-slate-600"></span>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="loginBtn" onclick="handleLogin()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-xs">老師 Google 登入</button>
            <button id="assistantBtn" onclick="openAssistantModal()" class="bg-amber-100 text-amber-700 px-4 py-2 rounded-xl font-bold text-xs">小老師登記</button>
            <div id="teacherArea" class="hidden flex items-center gap-2">
                <button onclick="openBehaviorSettings()" class="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-xs">項目設定</button>
                <button onclick="handleLogout()" class="text-slate-300 hover:text-red-500 text-[10px] font-bold">登出</button>
            </div>
        </div>
    </header>

    <main id="appContent" class="flex-1 overflow-hidden hidden">
        <section id="viewHub" class="h-full overflow-y-auto p-10">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-end mb-10">
                    <h2 class="text-3xl font-black text-slate-800">班級大廳</h2>
                    <button id="teacherOnlyAdd" onclick="openModal('classModal')" class="hidden bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold text-sm">＋ 建立班級</button>
                </div>
                <div id="classGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
            </div>
        </section>

        <section id="viewClassroom" class="h-full overflow-y-auto p-6 hidden-view">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="showHub()" class="text-slate-500 font-bold text-sm flex items-center gap-1">← 返回大廳</button>
                    <div class="flex gap-2">
                        <button id="teacherOnlyRename" onclick="openBatchRename()" class="hidden bg-amber-50 text-amber-600 px-4 py-2 rounded-xl font-bold text-xs">📝 批次改名</button>
                        <button onclick="openSummary()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold text-xs shadow-md">📊 結算報表</button>
                    </div>
                </div>
                <div id="studentGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 pb-20"></div>
            </div>
        </section>
    </main>

    <div id="assistantModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[200]">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl">
            <h3 class="font-black mb-6 text-center text-xl">小老師登入</h3>
            <input type="text" id="shareIdInput" placeholder="老師的分享 ID" class="w-full bg-slate-50 p-4 rounded-2xl mb-3 text-center font-mono">
            <button onclick="connectAsAssistant()" class="w-full py-4 bg-amber-500 text-white font-black rounded-2xl shadow-lg">確認連線</button>
            <button onclick="closeModal('assistantModal')" class="w-full mt-2 text-slate-400 text-xs font-bold">取消</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "你的_API_KEY",
            authDomain: "你的_PROJECT_ID.firebaseapp.com",
            projectId: "你的_PROJECT_ID",
            storageBucket: "你的_PROJECT_ID.appspot.com",
            messagingSenderId: "你的_SENDER_ID",
            appId: "你的_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.handleLogin = () => signInWithPopup(auth, provider);
        window.handleLogout = () => { signOut(auth); location.reload(); };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.isTeacher = true;
                window.currentUID = user.uid;
                document.getElementById('teacherArea').classList.remove('hidden');
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('assistantBtn').classList.add('hidden');
                document.getElementById('teacherOnlyAdd').classList.remove('hidden');
                document.body.classList.add('admin-mode');
                
                // 實時監聽資料
                onSnapshot(doc(db, "users", user.uid), (doc) => {
                    if (doc.exists()) {
                        window.classData = doc.data();
                        renderHub();
                    } else {
                        // 初始化資料庫
                        window.classData = { db: {}, behaviors: [{name:"優異",point:1},{name:"待加強",point:-1}] };
                        window.saveToCloud();
                    }
                    document.getElementById('appContent').classList.remove('hidden');
                    document.getElementById('loadingOverlay').style.display = 'none';
                });
            } else {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        });

        window.saveToCloud = async () => {
            if(!window.currentUID) return;
            await setDoc(doc(db, "users", window.currentUID), window.classData);
        };

        window.connectAsAssistant = async () => {
            const uid = document.getElementById('shareIdInput').value.trim();
            if(!uid) return;
            const docSnap = await getDoc(doc(db, "users", uid));
            if(docSnap.exists()){
                window.isTeacher = false;
                window.currentUID = uid;
                window.classData = docSnap.data();
                renderHub();
                closeModal('assistantModal');
                document.getElementById('appContent').classList.remove('hidden');
                document.getElementById('assistantBtn').innerText = "已連線 ID: " + uid.slice(0,5);
            } else { alert("找不到資料"); }
        };
    </script>

    <script>
        const ANIMALS = ['🦁','🐯','🦒','🦊','🐨','🐼','🐻','🐰','🐹','🐭','🐸','🐧','🐦','🐤','🦉','🦄','🐴','🐮','🐷','🐙','🐶','🐠','🦀','🦋','🐝','🐞','🐿️','🦍'];
        const COLORS = ['bubble-pink', 'bubble-blue', 'bubble-green', 'bubble-purple', 'bubble-orange'];
        let currentClass = "";

        window.renderHub = () => {
            const grid = document.getElementById('classGrid');
            const classes = Object.keys(window.classData.db);
            grid.innerHTML = classes.map((name, i) => `
                <div onclick="checkClassAccess('${name}')" class="bubble-card ${COLORS[i % COLORS.length]} p-8 cursor-pointer shadow-sm">
                    <h3 class="text-2xl font-black text-slate-800">${name}</h3>
                    <p class="text-xs text-slate-500 font-bold mt-2">${window.classData.db[name].students.length} 名學生</p>
                    
                    ${window.isTeacher ? `
                        <div class="absolute top-4 right-4 flex gap-2">
                            <button onclick="event.stopPropagation(); setClassPassword('${name}')" class="bg-white/50 p-2 rounded-full text-xs" title="設定密碼">🔒</button>
                            <button onclick="event.stopPropagation(); deleteClass('${name}')" class="bg-white/50 p-2 rounded-full text-xs">✕</button>
                        </div>
                    ` : ''}
                </div>
            `).join('') || `<div class="col-span-full py-20 text-center text-slate-300 font-bold">點擊右上角登入後建立班級</div>`;
        };

        // 檢查進入權限
        window.checkClassAccess = (name) => {
            if (window.isTeacher) {
                enterClass(name);
            } else {
                const pass = prompt("請輸入該班級的小老師密碼：");
                if (pass === window.classData.db[name].password) {
                    enterClass(name);
                } else {
                    alert("密碼錯誤！");
                }
            }
        };

        // 老師設定密碼
        window.setClassPassword = (name) => {
            const oldPass = window.classData.db[name].password || "未設定";
            const newPass = prompt(`目前 ${name} 密碼為 [${oldPass}]\n請輸入新密碼：`);
            if (newPass !== null) {
                window.classData.db[name].password = newPass;
                window.saveToCloud();
                showToast("密碼已更新");
            }
        };

        window.enterClass = (name) => {
            currentClass = name;
            document.getElementById('viewHub').classList.add('hidden-view');
            document.getElementById('viewClassroom').classList.remove('hidden-view');
            document.getElementById('breadcrumbClass').innerText = name;
            document.getElementById('navBreadcrumb').classList.remove('hidden');
            if(window.isTeacher) document.getElementById('teacherOnlyRename').classList.remove('hidden');
            renderClassroom();
        };

        window.submitNewClass = () => {
            const name = document.getElementById('newClassName').value.trim();
            const count = parseInt(document.getElementById('studentCount').value) || 0;
            const pass = prompt("請為此班級設定一個小老師密碼：", "1234");
            if(name && pass) {
                // 資料結構更新：students + password
                window.classData.db[name] = {
                    students: Array.from({length: count}, (_, i) => ({ name: `學生 ${i+1}`, logs: [], icon: '' })),
                    password: pass
                };
                window.saveToCloud();
                renderHub();
                closeModal('classModal');
            }
        };

        window.renderClassroom = () => {
            const grid = document.getElementById('studentGrid');
            const students = window.classData.db[currentClass].students; // 注意這裡多了 .students
            grid.innerHTML = students.map((s, idx) => {
                const total = s.logs.reduce((sum, l) => sum + l.point, 0);
                return `
                    <div onclick="openStudentModal(${idx})" class="student-card p-5">
                        <div class="text-4xl mb-2">${s.icon || ANIMALS[idx % ANIMALS.length]}</div>
                        <div class="font-bold text-slate-700 text-sm truncate">${s.name}</div>
                        <div class="mt-2 font-black text-xs ${total >= 0 ? 'text-emerald-500' : 'text-red-500'}">${total > 0 ? '+' : ''}${total}</div>
                    </div>
                `;
            }).join('');
        };

        // [其餘所有 V24 的原本功能 (addLog, rename, summary...) 邏輯完全相同]
        // [只需注意資料存取路徑從 window.classData.db[name] 變成 window.classData.db[name].students]
    </script>
</body>
</html>
