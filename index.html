<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級管理系統 Firebase 終極整合版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', 'Noto Sans TC', sans-serif; background: #f8fafc; min-height: 100vh; overflow: hidden; }
        .bubble-card { backdrop-filter: blur(8px); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.5); transition: 0.3s; }
        .bubble-pink { background: #fee2e2; } .bubble-blue { background: #e0f2fe; }
        .bubble-green { background: #dcfce7; } .bubble-purple { background: #f3e8ff; }
        .bubble-orange { background: #ffedd5; }
        .student-card { transition: 0.2s; cursor: pointer; border-radius: 1.25rem; background: white; border: 1px solid #e2e8f0; position: relative; }
        .student-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #cbd5e1; }
        .hidden-view { display: none !important; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #334155; color: white; padding: 10px 20px; border-radius: 12px; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #6366f1; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col" oncontextmenu="return false;">

    <div id="loadingOverlay">☁️ 雲端資料同步中...</div>
    <div id="toast">操作成功</div>

    <header class="bg-white/90 border-b border-slate-200 px-8 py-4 flex justify-between items-center z-[60]">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black text-slate-800 tracking-tight">CLASS MANAGER <span class="text-[10px] text-indigo-500 font-bold ml-1">CLOUD</span></h1>
            <div id="navBreadcrumb" class="hidden text-slate-400 font-bold flex items-center gap-2 text-sm">
                <span>/</span><span id="breadcrumbClass" class="text-slate-600"></span>
            </div>
        </div>
        <div id="authArea">
            <button id="loginBtn" onclick="handleLogin()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold text-xs shadow-md">Google 帳號登入</button>
            <div id="userInfo" class="hidden flex items-center gap-3">
                <span id="userName" class="text-xs font-bold text-slate-500"></span>
                <button onclick="handleLogout()" class="text-slate-300 hover:text-red-500 text-[10px] font-bold">登出</button>
            </div>
        </div>
    </header>

    <main id="mainApp" class="flex-1 overflow-hidden hidden">
        <section id="viewHub" class="flex-1 h-full overflow-y-auto p-10">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-end mb-10">
                    <h2 class="text-3xl font-black text-slate-800">班級大廳</h2>
                    <div class="flex gap-2">
                        <button onclick="openBehaviorSettings()" class="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-lg">加減分項目設定</button>
                        <button onclick="openModal('classModal')" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold text-sm">＋ 建立班級</button>
                    </div>
                </div>
                <div id="classGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
            </div>
        </section>

        <section id="viewClassroom" class="flex-1 h-full overflow-y-auto p-6 hidden-view">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="showHub()" class="text-slate-500 font-bold text-sm flex items-center gap-1">← 返回大廳</button>
                    <div class="flex gap-2">
                        <button onclick="openBatchRename()" class="bg-amber-50 text-amber-600 px-4 py-2 rounded-xl font-bold text-xs">📝 批次改名</button>
                        <button onclick="openModal('singleStudentModal')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold text-xs">＋ 學生</button>
                        <button onclick="openSummary()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold text-xs shadow-md">📊 結算報表</button>
                    </div>
                </div>
                <div id="studentGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 pb-20"></div>
            </div>
        </section>
    </main>

    <div id="classModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl">
            <h3 class="font-black mb-6 text-center text-xl text-slate-800">建立新班級</h3>
            <input type="text" id="newClassName" placeholder="例如：3年2班" class="w-full bg-slate-50 p-4 rounded-2xl mb-3 outline-none border-2 border-transparent focus:border-indigo-500">
            <input type="number" id="studentCount" placeholder="預設學生人數" class="w-full bg-slate-50 p-4 rounded-2xl mb-6 outline-none text-center">
            <button onclick="submitNewClass()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">確認建立</button>
            <button onclick="closeModal('classModal')" class="w-full mt-2 text-slate-400 text-xs font-bold">取消</button>
        </div>
    </div>

    <div id="scoreModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[200] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 id="scoreModalTitle" class="font-black text-xl"></h3>
                <button onclick="closeModal('scoreModal')" class="text-slate-300 hover:text-slate-500">✕</button>
            </div>
            <div id="behaviorList" class="grid grid-cols-2 gap-3 mb-6"></div>
            <div class="border-t pt-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-3">最近紀錄</p>
                <div id="recentLogs" class="space-y-2 max-h-40 overflow-y-auto custom-scroll text-sm"></div>
            </div>
        </div>
    </div>

    <div id="summaryModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[200] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-2xl h-[80vh] flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-2xl">結算報表</h3>
                <button onclick="closeModal('summaryModal')" class="bg-slate-100 p-2 rounded-full text-slate-400">✕</button>
            </div>
            <div id="summaryList" class="flex-1 overflow-y-auto custom-scroll pr-4"></div>
            <div class="mt-6 flex gap-3">
                <button onclick="resetAllScores()" class="flex-1 py-4 bg-red-50 text-red-600 font-black rounded-2xl">全部清空重置</button>
                <button onclick="closeModal('summaryModal')" class="flex-1 py-4 bg-slate-800 text-white font-black rounded-2xl">關閉</button>
            </div>
        </div>
    </div>

    <div id="batchRenameModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[200] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h3 class="font-black text-xl mb-4 text-center">批次修改學生姓名</h3>
            <p class="text-xs text-slate-400 mb-4 text-center">每行一個姓名，將依序替換</p>
            <textarea id="batchNameInput" class="w-full h-64 bg-slate-50 p-4 rounded-2xl mb-4 outline-none border-2 border-transparent focus:border-indigo-500 resize-none font-bold" placeholder="王小明&#10;李小華"></textarea>
            <button onclick="submitBatchRename()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">確認套用</button>
            <button onclick="closeModal('batchRenameModal')" class="w-full mt-2 text-slate-400 text-xs font-bold">取消</button>
        </div>
    </div>

    <div id="behaviorModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[200] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h3 class="font-black text-xl mb-6 text-center">項目設定</h3>
            <div id="behaviorSettingsList" class="space-y-3 mb-6 max-h-60 overflow-y-auto custom-scroll pr-2"></div>
            <div class="grid grid-cols-4 gap-2 mb-6">
                <input type="text" id="newBehaviorName" placeholder="項目" class="col-span-2 bg-slate-50 p-3 rounded-xl text-sm font-bold">
                <input type="number" id="newBehaviorPoint" placeholder="分" class="bg-slate-50 p-3 rounded-xl text-sm font-bold text-center">
                <button onclick="addBehaviorItem()" class="bg-slate-800 text-white rounded-xl font-bold text-xs">＋</button>
            </div>
            <button onclick="closeModal('behaviorModal')" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">儲存並關閉</button>
        </div>
    </div>

    <div id="singleStudentModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[200] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl">
            <h3 class="font-black mb-6 text-center text-xl">加入新成員</h3>
            <input type="text" id="singleStudentName" placeholder="學生姓名" class="w-full bg-slate-50 p-4 rounded-2xl mb-6 outline-none text-center font-bold border-2 border-transparent focus:border-indigo-500">
            <button onclick="addSingleStudent()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">加入名單</button>
            <button onclick="closeModal('singleStudentModal')" class="w-full mt-2 text-slate-400 text-xs font-bold">取消</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // === 🛠️ 請替換你的設定碼 ===
        const firebaseConfig = {
  apiKey: "AIzaSyAUeT5FQHuvw5E9b6qIQP0TKK3yDEh2yRQ",
  authDomain: "classmanagerpro-39029.firebaseapp.com",
  projectId: "classmanagerpro-39029",
  storageBucket: "classmanagerpro-39029.firebasestorage.app",
  messagingSenderId: "318739486360",
  appId: "1:318739486360:web:74b6cd3e3cbc2a030e62ed"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.handleLogin = () => signInWithPopup(auth, provider);
        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                window.currentUser = user;
                await syncData();
            } else {
                document.getElementById('userInfo').classList.add('hidden');
                document.getElementById('loginBtn').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        });

        window.syncData = async () => {
            document.getElementById('loadingOverlay').style.display = 'flex';
            const docRef = doc(db, "users", auth.currentUser.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const cloudData = docSnap.data();
                window.dbData = cloudData.db || {};
                window.behaviors = cloudData.behaviors || [];
            } else {
                window.dbData = {};
                window.behaviors = [
                    { name: "勇於發言", point: 1 }, { name: "熱心助人", point: 1 }, 
                    { name: "未帶課本", point: -1 }, { name: "干擾秩序", point: -1 }
                ];
                await window.saveToCloud();
            }
            renderHub();
            document.getElementById('loadingOverlay').style.display = 'none';
        };

        window.saveToCloud = async () => {
            if (!auth.currentUser) return;
            try {
                await setDoc(doc(db, "users", auth.currentUser.uid), {
                    db: window.dbData,
                    behaviors: window.behaviors
                });
                showToast("☁️ 已自動儲存至雲端");
            } catch (e) { console.error(e); }
        };
    </script>

    <script>
        const ANIMALS = ['🦁','🐯','🦒','🦊','🐨','🐼','🐻','🐰','🐹','🐭','🐸','🐧','🐦','🐤','🦉','🦄','🐴','🐮','🐷','🐙','🦆','🐢','🐊','🐍','🐳','🐬','🐶','🐠','🦀','🦋','🐝','🐞','🐿️','🦍','🐘','🦏','🐪','🦓','🦘'];
        const COLORS = ['bubble-pink', 'bubble-blue', 'bubble-green', 'bubble-purple', 'bubble-orange'];
        
        window.dbData = {};
        window.behaviors = [];
        let currentClass = "", currentStudentIdx = -1;

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 1500);
        };

        window.openModal = (id) => document.getElementById(id).classList.replace('hidden', 'flex');
        window.closeModal = (id) => document.getElementById(id).classList.replace('flex', 'hidden');

        // 班級管理
        window.submitNewClass = () => {
            const n = document.getElementById('newClassName').value.trim();
            const c = parseInt(document.getElementById('studentCount').value) || 0;
            if (n) {
                window.dbData[n] = Array.from({length: c}, (_, i) => ({ name: `學生 ${i+1}`, logs: [] }));
                window.saveToCloud(); renderHub(); closeModal('classModal');
            }
        };

        window.deleteClass = (n) => {
            if (confirm(`確定刪除 ${n}？所有資料將無法找回。`)) {
                delete window.dbData[n]; window.saveToCloud(); renderHub();
            }
        };

        window.enterClass = (name) => {
            currentClass = name;
            document.getElementById('viewHub').classList.add('hidden-view');
            document.getElementById('viewClassroom').classList.remove('hidden-view');
            document.getElementById('navBreadcrumb').classList.remove('hidden');
            document.getElementById('breadcrumbClass').innerText = name;
            renderClassroom();
        };

        window.showHub = () => {
            currentClass = "";
            document.getElementById('viewHub').classList.remove('hidden-view');
            document.getElementById('viewClassroom').classList.add('hidden-view');
            document.getElementById('navBreadcrumb').classList.add('hidden');
            renderHub();
        };

        // 渲染函數
        window.renderHub = () => {
            const grid = document.getElementById('classGrid');
            const classes = Object.keys(window.dbData);
            grid.innerHTML = classes.map((name, i) => `
                <div onclick="enterClass('${name}')" class="bubble-card ${COLORS[i % COLORS.length]} p-8 relative group">
                    <h3 class="text-2xl font-black text-slate-800">${name}</h3>
                    <p class="text-xs text-slate-500 font-bold mt-2 uppercase tracking-widest">${window.dbData[name].length} 學生名單</p>
                    <button onclick="event.stopPropagation(); deleteClass('${name}')" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">✕</button>
                </div>
            `).join('') || `<div class="col-span-full py-20 text-center text-slate-300 font-bold">尚未建立班級</div>`;
        };

        window.renderClassroom = () => {
            const grid = document.getElementById('studentGrid');
            const students = window.dbData[currentClass];
            grid.innerHTML = students.map((s, idx) => {
                const total = s.logs.reduce((sum, l) => sum + l.point, 0);
                return `
                    <div class="student-card p-5" onclick="openScoreModal(${idx})">
                        <div class="text-4xl mb-2">${ANIMALS[idx % ANIMALS.length]}</div>
                        <div class="font-bold text-slate-700 text-sm truncate">${s.name}</div>
                        <div class="mt-2 font-black text-xs ${total >= 0 ? 'text-emerald-500' : 'text-red-500'}">
                            ${total > 0 ? '+' : ''}${total}
                        </div>
                    </div>
                `;
            }).join('');
        };

        // 加減分邏輯
        window.openScoreModal = (idx) => {
            currentStudentIdx = idx;
            const s = window.dbData[currentClass][idx];
            document.getElementById('scoreModalTitle').innerText = s.name;
            renderBehaviorButtons();
            renderRecentLogs();
            openModal('scoreModal');
        };

        function renderBehaviorButtons() {
            const list = document.getElementById('behaviorList');
            list.innerHTML = window.behaviors.map(b => `
                <button onclick="addLog(${b.point}, '${b.name}')" class="p-4 rounded-2xl border-2 border-slate-50 hover:bg-slate-50 transition text-left group">
                    <div class="text-[10px] font-bold text-slate-400 uppercase">${b.point > 0 ? '＋ 加分' : '－ 扣分'}</div>
                    <div class="font-bold text-slate-700">${b.name}</div>
                    <div class="text-xs font-black ${b.point > 0 ? 'text-emerald-500' : 'text-red-500'}">${b.point > 0 ? '+' : ''}${b.point}</div>
                </button>
            `).join('');
        }

        function renderRecentLogs() {
            const s = window.dbData[currentClass][currentStudentIdx];
            const logs = [...s.logs].reverse().slice(0, 5);
            document.getElementById('recentLogs').innerHTML = logs.map(l => `
                <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg">
                    <span class="font-bold text-slate-600">${l.name}</span>
                    <span class="font-black ${l.point > 0 ? 'text-emerald-500' : 'text-red-500'}">${l.point > 0 ? '+' : ''}${l.point}</span>
                </div>
            `).join('') || `<p class="text-center py-4 text-slate-300">尚無紀錄</p>`;
        }

        window.addLog = (point, name) => {
            window.dbData[currentClass][currentStudentIdx].logs.push({ name, point, time: new Date().toISOString() });
            window.saveToCloud(); renderClassroom(); renderRecentLogs();
            showToast(`已為 ${window.dbData[currentClass][currentStudentIdx].name} ${point > 0 ? '加' : '扣'}分`);
        };

        // 報表與設定
        window.openSummary = () => {
            const list = document.getElementById('summaryList');
            const students = [...window.dbData[currentClass]].sort((a,b) => {
                const ta = a.logs.reduce((s,l) => s + l.point, 0);
                const tb = b.logs.reduce((s,l) => s + l.point, 0);
                return tb - ta;
            });
            list.innerHTML = students.map((s, i) => {
                const total = s.logs.reduce((sum, l) => sum + l.point, 0);
                return `
                    <div class="flex items-center justify-between p-4 border-b">
                        <div class="flex items-center gap-4">
                            <span class="font-black text-slate-300 w-6">${i+1}</span>
                            <span class="font-bold">${s.name}</span>
                        </div>
                        <span class="font-black ${total >= 0 ? 'text-emerald-500' : 'text-red-500'}">${total}</span>
                    </div>
                `;
            }).join('');
            openModal('summaryModal');
        };

        window.resetAllScores = () => {
            if(confirm("確定要重置全班分數嗎？此操作不可還原。")) {
                window.dbData[currentClass].forEach(s => s.logs = []);
                window.saveToCloud(); renderClassroom(); closeModal('summaryModal');
            }
        };

        window.openBatchRename = () => {
            document.getElementById('batchNameInput').value = window.dbData[currentClass].map(s => s.name).join('\n');
            openModal('batchRenameModal');
        };

        window.submitBatchRename = () => {
            const names = document.getElementById('batchNameInput').value.trim().split('\n');
            names.forEach((name, i) => {
                if(window.dbData[currentClass][i]) window.dbData[currentClass][i].name = name.trim();
            });
            window.saveToCloud(); renderClassroom(); closeModal('batchRenameModal');
        };

        window.addSingleStudent = () => {
            const n = document.getElementById('singleStudentName').value.trim();
            if(n) {
                window.dbData[currentClass].push({ name: n, logs: [] });
                window.saveToCloud(); renderClassroom(); closeModal('singleStudentModal');
            }
        };

        window.openBehaviorSettings = () => {
            const list = document.getElementById('behaviorSettingsList');
            list.innerHTML = window.behaviors.map((b, i) => `
                <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-xl">
                    <span class="flex-1 font-bold text-sm">${b.name} (${b.point})</span>
                    <button onclick="deleteBehavior(${i})" class="text-red-400 hover:text-red-600 px-2">✕</button>
                </div>
            `).join('');
            openModal('behaviorModal');
        };

        window.addBehaviorItem = () => {
            const n = document.getElementById('newBehaviorName').value.trim();
            const p = parseInt(document.getElementById('newBehaviorPoint').value);
            if(n && !isNaN(p)) {
                window.behaviors.push({ name: n, point: p });
                document.getElementById('newBehaviorName').value = "";
                document.getElementById('newBehaviorPoint').value = "";
                window.saveToCloud(); openBehaviorSettings();
            }
        };

        window.deleteBehavior = (i) => {
            window.behaviors.splice(i, 1);
            window.saveToCloud(); openBehaviorSettings();
        };
    </script>
</body>
</html>
