<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級管理系統 V26.4.0 Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', 'Noto Sans TC', sans-serif; background: #f8fafc; min-height: 100vh; overflow: hidden; }
        .bubble-card { backdrop-filter: blur(8px); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.5); transition: 0.3s; }
        .bubble-pink { background: #fee2e2; } .bubble-blue { background: #e0f2fe; }
        .bubble-green { background: #dcfce7; } .bubble-purple { background: #f3e8ff; }
        .bubble-orange { background: #ffedd5; }
        .student-card { transition: 0.2s; cursor: pointer; border-radius: 1.25rem; background: white; border: 1px solid #e2e8f0; position: relative; }
        .student-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #cbd5e1; }
        .admin-controls { position: absolute; top: 0.4rem; right: 0.4rem; display: none; flex-direction: column; gap: 4px; z-index: 50; }
        body.admin-mode .admin-controls { display: flex; }
        .hidden-view { display: none !important; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #334155; color: white; padding: 10px 20px; border-radius: 12px; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; font-size: 14px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .report-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; margin: 0 4px 4px 0; }
        .tag-plus { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .tag-minus { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #6366f1; }
        .icon-selector-btn { border: 2px solid transparent; transition: 0.2s; }
        .icon-selector-btn.active { border-color: #6366f1; background: #eef2ff; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="loadingOverlay">☁️ 雲端資料同步中...</div>
    <div id="toast">操作成功</div>

    <header class="bg-white/90 border-b border-slate-200 px-8 py-4 flex justify-between items-center z-[60]">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black text-slate-800 tracking-tight">CLASS MANAGER <span class="text-[10px] text-indigo-500 font-bold ml-1">CLOUD V2</span></h1>
            <div id="navBreadcrumb" class="hidden text-slate-400 font-bold flex items-center gap-2 text-sm">
                <span>/</span><span id="breadcrumbClass" class="text-slate-600"></span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="syncFromCloud()" class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl font-bold text-xs hover:bg-emerald-100 transition">🔄 重新整理</button>
            <button onclick="toggleAdminMode()" id="adminToggleBtn" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl font-bold text-xs">🔒 小老師模式</button>
            <button onclick="openBehaviorSettings()" id="settingsBtn" class="hidden bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-lg">項目設定</button>
        </div>
    </header>

    <section id="viewHub" class="flex-1 overflow-y-auto p-10">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-end mb-10">
                <h2 class="text-3xl font-black text-slate-800">班級大廳</h2>
                <button id="addClassBtn" onclick="openModal('classModal')" class="hidden bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold text-sm">＋ 建立班級</button>
            </div>
            <div id="classGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
        </div>
    </section>

    <section id="viewClassroom" class="flex-1 overflow-y-auto p-6 hidden-view">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <button onclick="showHub()" class="text-slate-500 font-bold text-sm flex items-center gap-1">← 返回大廳</button>
                <div class="flex gap-2">
                    <button id="batchRenameBtn" onclick="openBatchRename()" class="hidden bg-amber-50 text-amber-600 px-4 py-2 rounded-xl font-bold text-xs">📝 批次改名</button>
                    <button id="addStudentBtn" onclick="openModal('singleStudentModal')" class="hidden bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold text-xs">＋ 學生</button>
                    <button onclick="openSummary()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold text-xs shadow-md">📊 結算統計</button>
                </div>
            </div>
            <div id="studentGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 pb-20"></div>
        </div>
    </section>

    <div id="passwordModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[200] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-xs shadow-2xl text-center">
            <h3 id="pwTitle" class="text-lg font-black mb-4">身份驗證</h3>
            <input type="password" id="pwInput" placeholder="請輸入密碼" class="w-full bg-slate-50 p-4 rounded-2xl mb-4 text-center font-bold outline-none border-2 border-transparent focus:border-indigo-500 transition-all">
            <div class="flex gap-2">
                <button onclick="closeModal('passwordModal')" class="flex-1 py-3 text-slate-400 font-bold text-sm">取消</button>
                <button id="pwConfirmBtn" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-2xl text-sm">確認</button>
            </div>
        </div>
    </div>

    <div id="batchRenameModal" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-[110] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md mx-4 shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 mb-2">批次修改姓名</h3>
            <textarea id="batchNameInput" class="w-full h-64 bg-slate-50 p-4 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none font-bold text-slate-700 custom-scroll" placeholder="輸入姓名，每行一個"></textarea>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal('batchRenameModal')" class="flex-1 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl text-sm">取消</button>
                <button onclick="submitBatchRename()" class="flex-1 py-4 bg-indigo-600 text-white font-bold rounded-2xl text-sm shadow-lg shadow-indigo-100">儲存更新</button>
            </div>
        </div>
    </div>

    <div id="summaryModal" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-[110] backdrop-blur-sm">
        <div class="bg-white p-6 rounded-[2.5rem] w-full max-w-4xl mx-4 shadow-2xl max-h-[85vh] flex flex-col">
            <div class="flex justify-between items-center mb-6 px-2">
                <h3 class="text-2xl font-black text-slate-800">班級結算報表</h3>
                <button onclick="copySummaryReport()" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold text-xs">📋 複製報表文本</button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scroll border border-slate-100 rounded-3xl">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 sticky top-0 font-bold text-slate-500">
                        <tr><th class="p-4 text-center">#</th><th class="p-4">學生姓名</th><th class="p-4 text-center">當前得分</th><th class="p-4">表現紀錄</th></tr>
                    </thead>
                    <tbody id="summaryTableBody" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
            <button onclick="closeModal('summaryModal')" class="w-full mt-6 py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl text-sm">關閉統計</button>
        </div>
    </div>

    <div id="studentModal" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl w-full max-w-4xl flex flex-col md:flex-row gap-8 mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex-1">
                <div class="flex items-center gap-5 mb-6">
                    <div id="modalAvatar" class="text-6xl bg-slate-50 w-20 h-20 flex items-center justify-center rounded-3xl"></div>
                    <div>
                        <h3 id="modalStudentName" class="text-3xl font-black text-slate-800"></h3>
                        <p class="text-slate-400 font-bold text-xs mt-1 uppercase">Student Profile</p>
                    </div>
                </div>
                <div id="iconSelectorContainer" class="hidden mb-6 bg-slate-50 p-4 rounded-2xl">
                    <p class="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-wider">選擇圖案 (老師專用)</p>
                    <div id="iconGrid" class="grid grid-cols-8 gap-2 max-h-32 overflow-y-auto custom-scroll p-1"></div>
                </div>
                <div id="behaviorGrid" class="grid grid-cols-2 gap-3"></div>
                <button onclick="closeModal('studentModal')" class="w-full mt-8 py-4 bg-slate-800 text-white font-black rounded-2xl shadow-xl">儲存並離開</button>
            </div>
            <div class="w-full md:w-72 border-l border-slate-100 md:pl-8">
                <p class="text-[10px] font-black text-slate-400 mb-4 uppercase">近期登記紀錄</p>
                <div id="historyList" class="space-y-3 max-h-96 overflow-y-auto text-[11px] custom-scroll pr-2"></div>
            </div>
        </div>
    </div>

    <div id="classModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-xs shadow-2xl">
            <h3 class="font-black mb-6 text-center text-xl">建立新班級</h3>
            <input type="text" id="newClassName" placeholder="例如：101班" class="w-full bg-slate-50 p-4 rounded-2xl mb-3 outline-none border border-transparent focus:border-indigo-400 transition">
            <input type="number" id="studentCount" placeholder="預設學生人數" class="w-full bg-slate-50 p-4 rounded-2xl mb-6 outline-none text-center">
            <button onclick="submitNewClass()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">建立班級</button>
        </div>
    </div>

    <div id="singleStudentModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[110]">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-xs shadow-2xl text-center">
            <h3 class="font-black mb-6 text-xl">加入新成員</h3>
            <input type="text" id="singleStudentName" placeholder="學生姓名" class="w-full bg-slate-50 p-4 rounded-2xl mb-6 outline-none text-center font-bold">
            <button onclick="addSingleStudent()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">加入名單</button>
        </div>
    </div>

    <div id="behaviorModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[110]">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm shadow-2xl">
            <h3 class="font-black mb-6 text-xl">加減分項目設定</h3>
            <div id="bhManagerList" class="space-y-2 mb-6 max-h-56 overflow-y-auto custom-scroll pr-2"></div>
            <div class="bg-slate-50 p-4 rounded-2xl">
                <div class="flex gap-2 mb-3">
                    <input type="text" id="newBHName" placeholder="項目名稱" class="flex-1 p-3 bg-white rounded-xl text-sm border-none shadow-sm">
                    <input type="number" id="newBHPoint" value="-1" class="w-16 p-3 bg-white rounded-xl text-sm text-center font-bold">
                </div>
                <button onclick="addNewBH()" class="w-full bg-indigo-600 text-white py-3 rounded-xl text-sm font-bold shadow-md">新增加減分項目</button>
            </div>
            <button onclick="closeModal('behaviorModal')" class="w-full mt-6 text-slate-400 text-[10px] text-center uppercase tracking-widest font-bold">關閉設定</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 核心同步設定：請填入您的 GAS URL
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbwPGEfW3In-8UoMpf3CzygVw3nUOiFIBVO7jNiuqvCSFBcs-mR5G_rLsucE8_1X0xo/exec"; 

        const ANIMALS = ['🦁','🐯','🦒','🦊','🐨','🐼','🐻','🐰','🐹','🐭','🐸','🐧','🐦','🐤','🦉','🦄','🐴','🐮','🐷','🐙','🦆','🐊','🐍','🐳','🐬','🐶','🐠','🦀','🦋','🐝','🐞','🐿️','🦍','🐘','🦏','🐪','🦓','🦘','🐱','🐶','🦖','🦕','🐲','🌵','🍎','🍩','🚀'];
        const COLORS = ['bubble-pink', 'bubble-blue', 'bubble-green', 'bubble-purple', 'bubble-orange'];

        let db = {};
let behaviors = [];
let currentClass = null;

// ==========================================
// 2. 初始化與同步邏輯 (解決換裝置問題)
// ==========================================

window.onload = async () => {
    // A. 先讀取本地快取（讓畫面秒開）
    const localDB = localStorage.getItem('classroomDB');
    const localBH = localStorage.getItem('classroomBehaviors');
    if (localDB) db = JSON.parse(localDB);
    if (localBH) behaviors = JSON.parse(localBH);
    
    renderHub();

    // B. 強制從雲端抓取最新資料（確保換裝置也能同步）
    await syncFromCloud();
};

async function syncFromCloud() {
    if (!API_URL || API_URL.includes("請填入")) {
        showToast("⚠️ 請先設定 API_URL");
        return;
    }
    
    document.getElementById('loadingOverlay').style.display = 'flex';
    try {
        // 使用時間戳記防止瀏覽器快取舊資料
        const response = await fetch(`${API_URL}?t=${Date.now()}`, {
            method: 'GET',
            cache: 'no-cache',
            redirect: 'follow'
        });

        if (!response.ok) throw new Error("網路回應異常");

        const data = await response.json();
        
        // 如果雲端有資料，則覆蓋本地，達成同步
        if (data.db && Object.keys(data.db).length > 0) {
            db = data.db;
            behaviors = data.behaviors || [];
            
            // 更新本地儲存
            localStorage.setItem('classroomDB', JSON.stringify(db));
            localStorage.setItem('classroomBehaviors', JSON.stringify(behaviors));
            
            renderHub();
            if (currentClass) renderClassroom();
            showToast("☁️ 雲端同步成功");
        }
    } catch (e) {
        console.error("同步失敗:", e);
        showToast("❌ 同步失敗，使用本地存檔");
    } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
    }
}

async function saveToCloud() {
    if (!API_URL || API_URL.includes("請填入")) {
        showToast("⚠️ 請先設定 API_URL");
        return;
    }
    document.getElementById('loadingOverlay').style.display = 'flex';
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ db, behaviors }),
            redirect: 'follow'
        });
        const result = await response.json();
        if (result.status === "success") {
            showToast("🚀 資料已成功推送到雲端");
        }
    } catch (e) {
        console.error("儲存失敗:", e);
        showToast("❌ 儲存失敗");
    } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
    }
}

// ==========================================
// 3. 核心功能函式 (班級與學生管理)
// ==========================================

function saveDB() { localStorage.setItem('classroomDB', JSON.stringify(db)); }
function saveBehaviors() { localStorage.setItem('classroomBehaviors', JSON.stringify(behaviors)); }

function renderHub() {
    const hub = document.getElementById('classHub');
    const list = document.getElementById('classList');
    hub.style.display = 'block';
    document.getElementById('classroom').style.display = 'none';
    
    list.innerHTML = Object.keys(db).map(cls => `
        <div onclick="enterClass('${cls}')" class="bubble-card bg-white p-6 shadow-sm flex justify-between items-center cursor-pointer hover:shadow-md">
            <span class="text-xl font-bold text-slate-700">🏫 ${cls}</span>
            <button onclick="event.stopPropagation(); deleteClass('${cls}')" class="text-red-300 hover:text-red-500">刪除</button>
        </div>
    `).join('');
}

function addClass() {
    const name = prompt("請輸入班級名稱 (例如: 301):");
    if (name && !db[name]) {
        db[name] = [];
        saveDB();
        renderHub();
    }
}

function deleteClass(name) {
    if (confirm(`確定要刪除 ${name} 班嗎？`)) {
        delete db[name];
        saveDB();
        renderHub();
    }
}

function enterClass(name) {
    currentClass = name;
    document.getElementById('classHub').style.display = 'none';
    document.getElementById('classroom').style.display = 'block';
    document.getElementById('currentClassName').innerText = name;
    renderClassroom();
}

function renderClassroom() {
    const list = document.getElementById('studentList');
    list.innerHTML = db[currentClass].map((s, i) => {
        const total = (s.logs || []).reduce((sum, l) => sum + l.point, 0);
        return `
            <div class="student-card p-4 shadow-sm relative overflow-hidden bg-white" onclick="showScoreModal(${i})">
                <div class="text-center">
                    <div class="text-3xl mb-2">${s.icon || '👤'}</div>
                    <div class="font-bold text-slate-700">${s.name}</div>
                    <div class="text-2xl font-black ${total >= 0 ? 'text-blue-500' : 'text-red-500'}">${total}</div>
                </div>
                <div class="flex justify-center gap-1 mt-2">
                    <button onclick="event.stopPropagation(); moveStudent(${i}, -1)" class="p-1 text-slate-300 hover:text-slate-500">◀</button>
                    <button onclick="event.stopPropagation(); editStudent(${i})" class="text-xs text-slate-400 mx-1">編輯</button>
                    <button onclick="event.stopPropagation(); moveStudent(${i}, 1)" class="p-1 text-slate-300 hover:text-slate-500">▶</button>
                </div>
            </div>
        `;
    }).join('');
}

function addStudent() {
    const name = prompt("學生姓名:");
    if (name) {
        db[currentClass].push({ name, logs: [], icon: '👤' });
        saveDB();
        renderClassroom();
    }
}

function editStudent(i) {
    const s = db[currentClass][i];
    const n = prompt("修改姓名：", s.name);
    if(n) {
        s.name = n;
        const icon = prompt("更換圖示 (Emoji):", s.icon || '👤');
        if(icon) s.icon = icon;
        saveDB();
        renderClassroom();
    }
}

function moveStudent(idx, direction) {
    const targetIdx = idx + direction;
    if (targetIdx < 0 || targetIdx >= db[currentClass].length) return;
    [db[currentClass][idx], db[currentClass][targetIdx]] = [db[currentClass][targetIdx], db[currentClass][idx]];
    saveDB();
    renderClassroom();
}

// ==========================================
// 4. 評分與行為管理
// ==========================================

function showScoreModal(idx) {
    const s = db[currentClass][idx];
    document.getElementById('modalStudentName').innerText = s.name;
    const list = document.getElementById('behaviorList');
    list.innerHTML = behaviors.map(b => `
        <button onclick="addPoint(${idx}, '${b.name}', ${b.point})" 
            class="p-4 rounded-2xl font-bold text-white transition active:scale-95 ${b.point >= 0 ? 'bg-blue-400 hover:bg-blue-500' : 'bg-red-400 hover:bg-red-500'}">
            ${b.name} (${b.point >= 0 ? '+' : ''}${b.point})
        </button>
    `).join('');
    openModal('scoreModal');
}

function addPoint(sIdx, bName, pt) {
    const now = new Date();
    // 建立與 GAS 匹配的時間格式 M/D H:m
    const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    
    db[currentClass][sIdx].logs.push({ name: bName, point: pt, time: timeStr });
    saveDB();
    renderClassroom();
    closeModal('scoreModal');
    showToast(`${db[currentClass][sIdx].name}: ${bName} ${pt >= 0 ? '+' : ''}${pt}`);
}

function openBehaviorSettings() { renderBHManager(); openModal('behaviorModal'); }

function renderBHManager() {
    document.getElementById('bhManagerList').innerHTML = behaviors.map((b, i) => `
        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl mb-1">
            <span class="text-sm font-bold text-slate-600">${b.name} (${b.point})</span>
            <button onclick="behaviors.splice(${i}, 1); saveBehaviors(); renderBHManager();" class="text-red-400 p-2">✕</button>
        </div>
    `).join('');
}

function addNewBH() {
    const n = document.getElementById('newBHName').value.trim();
    const p = parseInt(document.getElementById('newBHPoint').value);
    if(n && !isNaN(p)) {
        behaviors.push({ name: n, point: p });
        saveBehaviors();
        renderBHManager();
        document.getElementById('newBHName').value = '';
        document.getElementById('newBHPoint').value = '1';
    }
}

// ==========================================
// 5. 通用 UI 函式
// ==========================================

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}
    </script>
</body>
</html>
