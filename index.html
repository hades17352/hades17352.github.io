<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級管理系統 Firebase 完整版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Nunito', 'Noto Sans TC', sans-serif; background: #f8fafc; min-height: 100vh; overflow: hidden; }
        .bubble-card { backdrop-filter: blur(8px); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.5); transition: 0.3s; }
        .bubble-pink { background: #fee2e2; } .bubble-blue { background: #e0f2fe; }
        .bubble-green { background: #dcfce7; } .bubble-purple { background: #f3e8ff; }
        .bubble-orange { background: #ffedd5; }
        .student-card { transition: 0.2s; cursor: pointer; border-radius: 1.25rem; background: white; border: 1px solid #e2e8f0; position: relative; }
        .student-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #cbd5e1; }
        .hidden-view { display: none !important; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #334155; color: white; padding: 10px 20px; border-radius: 12px; z-index: 1000; opacity: 0; transition: 0.3s; pointer-events: none; font-size: 14px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; font-weight: bold; color: #6366f1; }
    </style>
</head>
<body>

    <div id="loadingOverlay">☁️ 雲端資料同步中...</div>
    <div id="toast">操作成功</div>

    <div id="loginSection" class="h-screen flex flex-col items-center justify-center gap-6">
        <h1 class="text-4xl font-black text-slate-800">CLASS MANAGER <span class="text-indigo-500 text-sm">PRO</span></h1>
        <button onclick="handleLogin()" class="bg-white border-2 border-slate-200 px-8 py-4 rounded-2xl font-bold flex items-center gap-3 hover:bg-slate-50 shadow-sm">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            老師帳號登入
        </button>
    </div>

    <div id="appContent" class="h-screen flex flex-col hidden">
        <header class="bg-white border-b px-8 py-4 flex justify-between items-center z-[60]">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-black text-slate-800 tracking-tight">CLASS MANAGER</h1>
                <div id="navBreadcrumb" class="hidden text-slate-400 font-bold flex items-center gap-2 text-sm">
                    <span>/</span><span id="breadcrumbClass" class="text-slate-600"></span>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <span id="welcomeUser" class="text-xs font-bold text-slate-500"></span>
                <button onclick="handleLogout()" class="text-slate-300 hover:text-red-400 text-xs font-bold">登出</button>
            </div>
        </header>

        <section id="viewHub" class="flex-1 overflow-y-auto p-10">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-end mb-10">
                    <h2 class="text-3xl font-black text-slate-800">班級大廳</h2>
                    <button onclick="openModal('classModal')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-lg">＋ 建立班級</button>
                </div>
                <div id="classGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
            </div>
        </section>

        <section id="viewClassroom" class="flex-1 overflow-y-auto p-6 hidden-view">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="showHub()" class="text-slate-500 font-bold text-sm flex items-center gap-1">← 返回大廳</button>
                    <div class="flex gap-2">
                        <button onclick="openModal('singleStudentModal')" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold text-xs">＋ 學生</button>
                        <button onclick="openSummary()" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold text-xs shadow-md">📊 結算報表</button>
                    </div>
                </div>
                <div id="studentGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 pb-20"></div>
            </div>
        </section>
    </div>

    <div id="classModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-xs shadow-2xl">
            <h3 class="font-black mb-6 text-center text-xl">建立新班級</h3>
            <input type="text" id="newClassName" placeholder="例如：101班" class="w-full bg-slate-50 p-4 rounded-2xl mb-3 outline-none border border-transparent focus:border-indigo-400">
            <input type="number" id="studentCount" placeholder="學生人數" class="w-full bg-slate-50 p-4 rounded-2xl mb-6 outline-none text-center">
            <button onclick="submitNewClass()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">確認建立</button>
            <button onclick="closeModal('classModal')" class="w-full mt-2 text-slate-400 text-xs font-bold">取消</button>
        </div>
    </div>

    <div id="singleStudentModal" class="fixed inset-0 bg-slate-900/40 hidden items-center justify-center z-[110]">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-xs shadow-2xl text-center">
            <h3 class="font-black mb-6 text-xl">加入新成員</h3>
            <input type="text" id="singleStudentName" placeholder="學生姓名" class="w-full bg-slate-50 p-4 rounded-2xl mb-6 outline-none text-center font-bold">
            <button onclick="addSingleStudent()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg">加入名單</button>
            <button onclick="closeModal('singleStudentModal')" class="w-full mt-2 text-slate-400 text-xs font-bold">取消</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // === 🛠️ 請替換你的設定碼 ===
        const firebaseConfig = {
  apiKey: "AIzaSyAUeT5FQHuvw5E9b6qIQP0TKK3yDEh2yRQ",
  authDomain: "classmanagerpro-39029.firebaseapp.com",
  projectId: "classmanagerpro-39029",
  storageBucket: "classmanagerpro-39029.firebasestorage.app",
  messagingSenderId: "318739486360",
  appId: "1:318739486360:web:74b6cd3e3cbc2a030e62ed"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 登入功能掛載到 window
        window.handleLogin = () => signInWithPopup(auth, provider);
        window.handleLogout = () => signOut(auth);

        // 監聽登入
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                document.getElementById('welcomeUser').innerText = user.displayName;
                window.currentUser = user;
                await syncData();
            } else {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('appContent').classList.add('hidden');
            }
        });

        // 同步資料
        window.syncData = async () => {
            document.getElementById('loadingOverlay').style.display = 'flex';
            const docRef = doc(db, "users", auth.currentUser.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                window.classData = docSnap.data();
            } else {
                window.classData = { db: {}, behaviors: [{name:"勇於發言",point:1},{name:"熱心助人",point:1},{name:"未帶課本",point:-1},{name:"干擾秩序",point:-1}] };
            }
            window.renderHub(); // 現在 renderHub 已經在全域了
            document.getElementById('loadingOverlay').style.display = 'none';
        };

        window.saveData = async () => {
            showToast("⏳ 同步中...");
            await setDoc(doc(db, "users", auth.currentUser.uid), window.classData);
            showToast("✅ 已儲存");
        };
    </script>

    <script>
        const ANIMALS = ['🦁','🐯','🦒','🦊','🐨','🐼','🐻','🐰','🐹','🐭','🐸','🐧','🐦','🐤','🦉','🦄','🐴','🐮','🐷','🐙','🦆','🐢','🐊','🐍','🐳','🐬','🐶','🐠','🦀','🦋','🐝','🐞','🐿️','🦍','🐘','🦏','🐪','🦓','🦘'];
        const COLORS = ['bubble-pink', 'bubble-blue', 'bubble-green', 'bubble-purple', 'bubble-orange'];
        let currentClass = "";

        // UI 助手
        window.openModal = (id) => document.getElementById(id).classList.replace('hidden', 'flex');
        window.closeModal = (id) => document.getElementById(id).classList.replace('flex', 'hidden');
        window.showToast = (msg) => { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = "1"; setTimeout(() => t.style.opacity = "0", 1500); };

        // 進入班級
        window.enterClass = (name) => {
            currentClass = name;
            document.getElementById('viewHub').classList.add('hidden-view');
            document.getElementById('viewClassroom').classList.remove('hidden-view');
            document.getElementById('navBreadcrumb').classList.remove('hidden');
            document.getElementById('breadcrumbClass').innerText = name;
            renderClassroom();
        };

        window.showHub = () => {
            currentClass = "";
            document.getElementById('viewHub').classList.remove('hidden-view');
            document.getElementById('viewClassroom').classList.add('hidden-view');
            document.getElementById('navBreadcrumb').classList.add('hidden');
            renderHub();
        };

        window.renderHub = () => {
            const grid = document.getElementById('classGrid');
            const d = window.classData.db;
            grid.innerHTML = Object.keys(d).map((name, i) => `
                <div onclick="enterClass('${name}')" class="bubble-card ${COLORS[i % COLORS.length]} p-8 relative group">
                    <h3 class="text-2xl font-black text-slate-800">${name}</h3>
                    <p class="text-xs text-slate-500 font-bold mt-2 uppercase tracking-widest">${d[name].length} 學生</p>
                    <button onclick="event.stopPropagation(); deleteClass('${name}')" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">✕</button>
                </div>
            `).join('') || `<div class="col-span-full py-20 text-center text-slate-300 font-bold">點擊右上角新增班級</div>`;
        };

        window.renderClassroom = () => {
            const grid = document.getElementById('studentGrid');
            const students = window.classData.db[currentClass];
            grid.innerHTML = students.map((s, idx) => {
                const total = s.logs.reduce((sum, l) => sum + l.point, 0);
                return `
                    <div class="student-card p-5" onclick="alert('點擊了 ${s.name}，可在此擴充加分邏輯')">
                        <div class="text-4xl mb-2">${ANIMALS[idx % ANIMALS.length]}</div>
                        <div class="font-bold text-slate-700 text-sm">${s.name}</div>
                        <div class="mt-2 font-black text-xs ${total >= 0 ? 'text-emerald-500' : 'text-red-500'}">${total > 0 ? '+' : ''}${total}</div>
                    </div>
                `;
            }).join('');
        };

        window.submitNewClass = () => {
            const n = document.getElementById('newClassName').value.trim();
            const c = parseInt(document.getElementById('studentCount').value) || 0;
            if(n) {
                window.classData.db[n] = Array.from({length: c}, (_, i) => ({name: `學生 ${i+1}`, logs: []}));
                saveData(); renderHub(); closeModal('classModal');
            }
        };

        window.deleteClass = (n) => { if(confirm(`確定刪除 ${n}？`)) { delete window.classData.db[n]; saveData(); renderHub(); } };
        
        window.addSingleStudent = () => {
            const n = document.getElementById('singleStudentName').value.trim();
            if(n) {
                window.classData.db[currentClass].push({name: n, logs: []});
                saveData(); renderClassroom(); closeModal('singleStudentModal');
            }
        };
    </script>
</body>
</html>
