<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級管理系統 V26.4.0 Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', 'Noto Sans TC', sans-serif; background: #f8fafc; min-height: 100vh; overflow: hidden; }
        .bubble-card { backdrop-filter: blur(8px); border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.5); transition: 0.3s; }
        .student-card { transition: 0.2s; cursor: pointer; border-radius: 1.25rem; background: white; border: 1px solid #e2e8f0; position: relative; }
        .student-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal.active { display: flex; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #334155; color: white; padding: 10px 20px; border-radius: 12px; z-index: 1000; display: none; font-size: 14px; }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; color: #6366f1; }
        .admin-only { display: none !important; }
        body.admin-mode .admin-only { display: flex !important; }
        body.admin-mode .admin-only-inline { display: inline-block !important; }
        /* 旋轉動畫 */
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">雲端同步中...</div>
    </div>
    <div id="toast">操作成功</div>

    <header class="bg-white/90 border-b border-slate-200 px-8 py-4 flex justify-between items-center z-[60]">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black text-slate-800 tracking-tight">CLASS MANAGER <span class="text-[10px] text-indigo-500 font-bold ml-1">PRO</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="syncFromCloud()" class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-xl font-bold text-xs hover:bg-emerald-100 transition">🔄 同步雲端</button>
            <button onclick="saveToCloud()" class="admin-only-inline hidden bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-md">💾 儲存上傳</button>
            <button onclick="askAdminPassword()" id="adminToggleBtn" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl font-bold text-xs">🔒 老師模式</button>
        </div>
    </header>

    <main class="flex-1 overflow-hidden relative">
        <section id="viewHub" class="absolute inset-0 overflow-y-auto p-10">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-end mb-10">
                    <h2 class="text-3xl font-black text-slate-800">班級大廳</h2>
                    <button onclick="addClass()" class="admin-only hidden bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold text-sm">＋ 建立班級</button>
                </div>
                <div id="classList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
            </div>
        </section>

        <section id="viewClassroom" class="absolute inset-0 overflow-y-auto p-6 hidden">
            <div class="max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="showHub()" class="text-slate-500 font-bold text-sm flex items-center gap-1">← 返回大廳</button>
                    <h2 id="currentClassName" class="text-2xl font-black text-slate-800"></h2>
                    <div class="flex gap-2">
                        <button onclick="addStudent()" class="admin-only hidden bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold text-xs">＋ 學生</button>
                        <button onclick="openBehaviorSettings()" class="admin-only hidden bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-xs">項目設定</button>
                    </div>
                </div>
                <div id="studentList" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 pb-20"></div>
            </div>
        </section>
    </main>

    <div id="scoreModal" class="modal">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h3 id="modalStudentName" class="text-2xl font-black mb-6 text-center text-slate-800"></h3>
            <div id="behaviorList" class="grid grid-cols-2 gap-3"></div>
            <button onclick="closeModal('scoreModal')" class="w-full mt-6 py-4 bg-slate-100 text-slate-400 font-bold rounded-2xl">取消</button>
        </div>
    </div>

    <div id="behaviorModal" class="modal">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm shadow-2xl">
            <h3 class="font-black mb-6 text-xl text-slate-800">加減分項目設定</h3>
            <div id="bhManagerList" class="space-y-2 mb-6 max-h-56 overflow-y-auto pr-2"></div>
            <div class="bg-slate-50 p-4 rounded-2xl">
                <div class="flex gap-2 mb-3">
                    <input type="text" id="newBHName" placeholder="項目名稱" class="flex-1 p-3 rounded-xl text-sm border-none shadow-sm outline-none">
                    <input type="number" id="newBHPoint" value="1" class="w-16 p-3 rounded-xl text-sm text-center font-bold outline-none">
                </div>
                <button onclick="addNewBH()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">新增項目</button>
            </div>
            <button onclick="closeModal('behaviorModal')" class="w-full mt-4 text-slate-400 font-bold text-xs uppercase">關閉</button>
        </div>
    </div>

    <script>
        // 請確保這裡的 API 網址正確
        const API_URL = "https://script.google.com/macros/s/AKfycbwPGEfW3In-8UoMpf3CzygVw3nUOiFIBVO7jNiuqvCSFBcs-mR5G_rLsucE8_1X0xo/exec"; 
        
        let db = {};
        let behaviors = [];
        let currentClass = null;
        let isAdmin = false;

        window.onload = async () => {
            // 優先讀取本地，讓使用者立刻能操作
            const localDB = localStorage.getItem('classroomDB');
            const localBH = localStorage.getItem('classroomBehaviors');
            if (localDB) db = JSON.parse(localDB);
            if (localBH) behaviors = JSON.parse(localBH);
            
            renderHub();
            
            // 背景同步，不阻塞使用者
            syncFromCloud(true); 
        };

        // --- 優化後的同步功能 ---
        async function syncFromCloud(isSilent = false) {
            if(!isSilent) document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                // 增加 timeout 機制
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10秒逾時

                const response = await fetch(`${API_URL}?t=${Date.now()}`, { 
                    redirect: 'follow',
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                const data = await response.json();
                if (data.db) {
                    // 聰明合併：如果雲端班級數較多，才覆蓋本地
                    db = data.db;
                    behaviors = data.behaviors || [];
                    saveLocal();
                    renderHub();
                    if (currentClass) renderClassroom();
                    if(!isSilent) showToast("☁️ 雲端同步成功");
                }
            } catch (e) {
                if(!isSilent) showToast("❌ 同步逾時，已切換至離線模式");
                console.error("Sync error:", e);
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        async function saveToCloud() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loadingText').innerText = "上傳中，請稍候...";
            
            try {
                // 優化：只傳送必要的資料
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // 提高傳送速度，不等待完整回應
                    body: JSON.stringify({ db, behaviors }),
                    redirect: 'follow'
                });
                
                // 因為使用 no-cors，這裡會假設成功
                showToast("🚀 資料已送出，背景處理中");
            } catch (e) {
                showToast("❌ 上傳連線失敗");
            } finally {
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.display = 'none';
                    document.getElementById('loadingText').innerText = "雲端同步中...";
                }, 1000);
            }
        }

        // --- 核心渲染 ---
        function renderHub() {
            document.getElementById('viewHub').classList.remove('hidden');
            document.getElementById('viewClassroom').classList.add('hidden');
            const list = document.getElementById('classList');
            list.innerHTML = Object.keys(db).map(cls => `
                <div onclick="enterClass('${cls}')" class="bubble-card bg-white p-6 shadow-sm flex justify-between items-center cursor-pointer hover:shadow-md">
                    <span class="text-xl font-bold text-slate-700">🏫 ${cls}</span>
                    <button onclick="event.stopPropagation(); deleteClass('${cls}')" class="admin-only hidden text-red-300 hover:text-red-500 text-sm">刪除</button>
                </div>
            `).join('');
        }

        function renderClassroom() {
            const list = document.getElementById('studentList');
            if(!db[currentClass]) return;
            
            list.innerHTML = db[currentClass].map((s, i) => {
                const total = (s.logs || []).reduce((sum, l) => sum + l.point, 0);
                return `
                    <div class="student-card p-4 shadow-sm text-center" onclick="showScoreModal(${i})">
                        <div class="text-3xl mb-2">${s.icon || '👤'}</div>
                        <div class="font-bold text-slate-700 truncate">${s.name}</div>
                        <div class="text-2xl font-black ${total >= 0 ? 'text-blue-500' : 'text-red-500'}">${total}</div>
                        <div class="admin-only hidden justify-center gap-2 mt-2">
                            <button onclick="event.stopPropagation(); editStudent(${i})" class="text-[10px] text-slate-400 underline">改名</button>
                            <button onclick="event.stopPropagation(); moveStudent(${i}, -1)" class="text-[10px] text-slate-400">◀</button>
                            <button onclick="event.stopPropagation(); moveStudent(${i}, 1)" class="text-[10px] text-slate-400">▶</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 功能函式 ---
        function enterClass(name) {
            currentClass = name;
            document.getElementById('currentClassName').innerText = name;
            document.getElementById('viewHub').classList.add('hidden');
            document.getElementById('viewClassroom').classList.remove('hidden');
            renderClassroom();
        }

        function showHub() { currentClass = null; renderHub(); }

        function showScoreModal(idx) {
            const s = db[currentClass][idx];
            document.getElementById('modalStudentName').innerText = s.name;
            const list = document.getElementById('behaviorList');
            list.innerHTML = (behaviors.length ? behaviors : [{name:'未設定項目', point:0}]).map(b => `
                <button onclick="addPoint(${idx}, '${b.name}', ${b.point})" 
                    class="p-4 rounded-2xl font-bold text-white transition active:scale-95 ${b.point >= 0 ? 'bg-blue-400 hover:bg-blue-500' : 'bg-red-400 hover:bg-red-500'}">
                    ${b.name} (${b.point >= 0 ? '+' : ''}${b.point})
                </button>
            `).join('');
            openModal('scoreModal');
        }

        function addPoint(sIdx, bName, pt) {
            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
            if(!db[currentClass][sIdx].logs) db[currentClass][sIdx].logs = [];
            db[currentClass][sIdx].logs.push({ name: bName, point: pt, time: timeStr });
            saveLocal();
            renderClassroom();
            closeModal('scoreModal');
            showToast(`${db[currentClass][sIdx].name}: ${bName} ${pt >= 0 ? '+' : ''}${pt}`);
        }

        // --- 管理功能 ---
        function askAdminPassword() {
            if(isAdmin) {
                isAdmin = false;
                document.body.classList.remove('admin-mode');
                document.getElementById('adminToggleBtn').innerText = "🔒 老師模式";
                return;
            }
            const pw = prompt("請輸入管理員密碼:");
            if(pw === "1234") { 
                isAdmin = true;
                document.body.classList.add('admin-mode');
                document.getElementById('adminToggleBtn').innerText = "🔓 管理中";
                showToast("✅ 已開啟管理模式");
            } else if(pw !== null) {
                alert("密碼錯誤");
            }
        }

        function addClass() {
            const name = prompt("班級名稱:");
            if(name && !db[name]) { db[name] = []; saveLocal(); renderHub(); }
        }

        function deleteClass(name) {
            if(confirm(`確定刪除 ${name}？`)) { delete db[name]; saveLocal(); renderHub(); }
        }

        function addStudent() {
            const name = prompt("學生姓名:");
            if(name) { db[currentClass].push({name, logs: [], icon: '👤'}); saveLocal(); renderClassroom(); }
        }

        function editStudent(i) {
            const n = prompt("修改姓名:", db[currentClass][i].name);
            if(n) { db[currentClass][i].name = n; saveLocal(); renderClassroom(); }
        }

        function moveStudent(idx, dir) {
            const target = idx + dir;
            if(target < 0 || target >= db[currentClass].length) return;
            [db[currentClass][idx], db[currentClass][target]] = [db[currentClass][target], db[currentClass][idx]];
            saveLocal(); renderClassroom();
        }

        function openBehaviorSettings() { renderBHManager(); openModal('behaviorModal'); }

        function renderBHManager() {
            document.getElementById('bhManagerList').innerHTML = behaviors.map((b, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl mb-1">
                    <span class="text-sm font-bold">${b.name} (${b.point})</span>
                    <button onclick="behaviors.splice(${i}, 1); saveLocal(); renderBHManager();" class="text-red-400">✕</button>
                </div>
            `).join('');
        }

        function addNewBH() {
            const n = document.getElementById('newBHName').value.trim();
            const p = parseInt(document.getElementById('newBHPoint').value);
            if(n && !isNaN(p)) { behaviors.push({name: n, point: p}); saveLocal(); renderBHManager(); }
        }

        // --- 工具 ---
        function saveLocal() {
            localStorage.setItem('classroomDB', JSON.stringify(db));
            localStorage.setItem('classroomBehaviors', JSON.stringify(behaviors));
        }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block'; t.style.opacity = '1';
            setTimeout(() => { t.style.opacity = '0'; setTimeout(()=>t.style.display='none', 300); }, 3000);
        }
    </script>
</body>
</html>
